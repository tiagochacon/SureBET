version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: surebet_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: surebet
      POSTGRES_PASSWORD: surebet_secret
      POSTGRES_DB: surebet_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U surebet']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: surebet_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: surebet_backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://surebet:surebet_secret@postgres:5432/surebet_db
      REDIS_URL: redis://redis:6379
      ODDS_API_KEY: ${ODDS_API_KEY}
      ODDS_API_BASE_URL: https://api.the-odds-api.com
      POLLING_INTERVAL_SECONDS: 60
      ODDS_CACHE_TTL_SECONDS: 90
      MIN_ARBITRAGE_MARGIN: 0.005
      MIN_MINUTES_TO_GAME: 5
    ports:
      - '3001:3001'
    volumes:
      - ./backend/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: surebet_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_WS_URL: http://localhost:3001
    ports:
      - '3000:3000'
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
